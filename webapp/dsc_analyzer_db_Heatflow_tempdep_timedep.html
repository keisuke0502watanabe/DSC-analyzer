@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --bg4:#252525;
  --border:#2a2a2a;
  --border2:#333;
  --text:#e8e8e8;
  --text2:#999;
  --text3:#666;
  --accent:#4a9eff;
  --accent2:#2d7dd2;
  --heat:#e8644a;
  --cool:#4a9eff;
  --iso:#888;
  --green:#3dba7e;
  --warn:#e85a4a;
  --panel-w:260px;
  --chart-grid:#222;
  --chart-tick:#666;
}
:root.light{
  --bg:#f5f5f2;
  --bg2:#ffffff;
  --bg3:#f0f0ec;
  --bg4:#e4e4e0;
  --border:#e0e0da;
  --border2:#ccc;
  --text:#1a1a1a;
  --text2:#555;
  --text3:#888;

  --iso:#888;
  --green:#1e8c5a;
  --warn:#c0392b;

body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;display:flex;flex-direction:column}
code,input[type=number],input[type=text],.mono{font-family:'IBM Plex Mono',monospace}

.app{display:flex;flex:1;height:100vh;overflow:hidden}
.sidebar{width:var(--panel-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}
.sidebar.collapsed{width:0;border-right:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.app-notice{display:none;font-size:11px;line-height:1.4;padding:.45rem .85rem;background:#3d3420;border-bottom:1px solid var(--border2);color:#f0e6c6;flex-shrink:0;white-space:pre-wrap;word-break:break-word}

.app-notice.app-notice--on{display:block}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1rem;height:44px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;min-height:44px}

<script>
// ════════════════════════════════════════════════
//  STORAGE ADAPTER (IndexedDB / Supabase stub)
// ════════════════════════════════════════════════
class StorageAdapter {
  async saveFile(){throw new Error('Not implemented');}
  async listFiles(){throw new Error('Not implemented');}
  async getFile(){throw new Error('Not implemented');}
  async deleteFile(){throw new Error('Not implemented');}
  async clearFiles(){throw new Error('Not implemented');}
  async saveProject(){throw new Error('Not implemented');}
  async listProjects(){throw new Error('Not implemented');}
  async getProject(){throw new Error('Not implemented');}
  async deleteProject(){throw new Error('Not implemented');}
  async clearProjects(){throw new Error('Not implemented');}
  get name(){return 'base';}
}

class IndexedDBAdapter extends StorageAdapter {
  constructor(){super();this._db=null;}
  get name(){return 'IndexedDB';}
  async _open(){
    if(this._db)return this._db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open('dsc_analyzer_db',2);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('files')){const fs=db.createObjectStore('files',{keyPath:'id',autoIncrement:true});fs.createIndex('name','name',{unique:false});fs.createIndex('savedAt','savedAt',{unique:false});}
        if(!db.objectStoreNames.contains('projects')){const ps=db.createObjectStore('projects',{keyPath:'id',autoIncrement:true});ps.createIndex('name','name',{unique:false});ps.createIndex('savedAt','savedAt',{unique:false});}
      };
      req.onsuccess=e=>{this._db=e.target.result;res(this._db);};
      req.onerror=e=>rej(e.target.error);
    });
  }
  /** Resolve on transaction `complete` so a follow-up read sees committed data (same pattern as XRD analyzer). */
  async _tx(store,mode,fn){
    const db=await this._open();
    return new Promise((res,rej)=>{
      let req;
      try{
        const tx=db.transaction(store,mode);
        const st=tx.objectStore(store);
        req=fn(st);
      }catch(err){rej(err);return;}
      if(!req){rej(new Error('IDB: no request'));return;}
      let settled=false;
      const ok=()=>{if(settled)return;settled=true;res(req.result);};
      const bad=err=>{if(settled)return;settled=true;rej(err||new Error('IDB transaction failed'));};
      req.onerror=()=>bad(req.error);
      const idbTx=req.transaction;
      idbTx.onerror=()=>bad(idbTx.error);
      idbTx.onabort=()=>bad(idbTx.error||new DOMException('aborted','AbortError'));
      idbTx.oncomplete=ok;
    });
  }
  /** Cursor read so `id` is always set from primaryKey when inline key is missing from stored values. */
  async _listAllWithKeys(storeName){
    const db=await this._open();
    return new Promise((res,rej)=>{
      const out=[];
      const tx=db.transaction(storeName,'readonly');
      const st=tx.objectStore(storeName);
      const rq=st.openCursor();
      rq.onsuccess=e=>{
        const c=e.target.result;
        if(!c)return;
        const v=c.value;
        if(v&&typeof v==='object'){
          const pk=c.primaryKey;
          out.push({...v,id:v.id!=null&&v.id!==''?v.id:pk});
        }
        c.continue();
      };
      rq.onerror=()=>rej(rq.error);
      tx.onerror=()=>rej(tx.error);
      tx.oncomplete=()=>res(out);
    });
  }
  async saveFile(o){return this._tx('files','readwrite',st=>st.put({...o,savedAt:new Date().toISOString()}));}
  async listFiles(){return this._listAllWithKeys('files');}
  async getFile(id){return this._tx('files','readonly',st=>st.get(id));}
  async deleteFile(id){return this._tx('files','readwrite',st=>st.delete(id));}
  async clearFiles(){
    const db=await this._open();
    return new Promise((res,rej)=>{
      const tx=db.transaction('files','readwrite');
      let settled=false;
      const done=()=>{if(settled)return;settled=true;res();};
      const bad=e=>{if(settled)return;settled=true;rej(e||new Error('clear files'));};
      tx.oncomplete=done;
      tx.onerror=()=>bad(tx.error);
      tx.onabort=()=>bad(tx.error);
      const r=tx.objectStore('files').clear();
      r.onerror=()=>bad(r.error);
    });
  }
  async saveProject(o){return this._tx('projects','readwrite',st=>st.put({...o,savedAt:new Date().toISOString()}));}
  async listProjects(){return this._listAllWithKeys('projects');}
  async getProject(id){return this._tx('projects','readonly',st=>st.get(id));}
  async deleteProject(id){return this._tx('projects','readwrite',st=>st.delete(id));}
  async clearProjects(){
    const db=await this._open();
    return new Promise((res,rej)=>{
      const tx=db.transaction('projects','readwrite');
      let settled=false;
      const done=()=>{if(settled)return;settled=true;res();};
      const bad=e=>{if(settled)return;settled=true;rej(e||new Error('clear projects'));};
      tx.oncomplete=done;
      tx.onerror=()=>bad(tx.error);
      tx.onabort=()=>bad(tx.error);
      const r=tx.objectStore('projects').clear();
      r.onerror=()=>bad(r.error);
    });
  }
}

let adapter=new IndexedDBAdapter();
function setAdapter(a){adapter=a;document.getElementById('adapterBadge').textContent=a.name;document.getElementById('adapterBadge').className='adapter-badge idb';refreshDbPanels();}

//  CONSTANTS / STATE
// ════════════════════════════════════════════════
const FC=['#4a9eff','#e8644a','#9d88e8','#3dba7e','#e8a040','#e85a8a','#888','#90b840'];
const STYPE_COLOR={heating:'#e8644a',cooling:'#4a9eff',isothermal:'#888'};

let files=[]; let nextFid=1;

let outerChartOpen=true;

let outerView={xMin:null,xMax:null,yMin:null,yMax:null};

let outerAcc={axes:true,segments:true};
const fileAcc={};
let sidebarOpen=true;

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
let toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg;el.className=`toast show ${type==='err'?'err':'ok'}`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),4000);
  try{console.info('[toast]',type,msg);}catch(_e){}

/** file:// / 埋め込みフレーム / CDN 失敗の注意（XRD analyzer と同方針） */

let dbFileCache=[];let dbProjectCache=[];let fileSearchQuery='';
const projectFolderOpenState={};
async function refreshDbPanels(){

    let fc=await adapter.listFiles().catch(()=>[]);

function renderDbFileList(){
  const el=document.getElementById('dbFileList');

  if(!list.length){el.innerHTML='<div class="db-empty">No cached files</div>';return;}

    const d=new Date(f.savedAt),ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

function renderDbProjectList(){
  const el=document.getElementById('dbProjectList');
  if(!dbProjectCache.length){el.innerHTML='<div class="db-empty">No saved projects</div>';return;}
  const sorted=[...dbProjectCache].sort((a,b)=>{
    const fa=normalizeFolderPath(a.folder||'').toLowerCase(),fb=normalizeFolderPath(b.folder||'').toLowerCase();
    if(fa<fb)return-1;if(fa>fb)return 1;
    const ta=new Date(a.savedAt||0).getTime(),tb=new Date(b.savedAt||0).getTime();
    return tb-ta;
  });
  const root={children:new Map(),projects:[]};
  sorted.forEach(p=>{
    const folderPath=normalizeFolderPath(p.folder||'');
    if(!folderPath){root.projects.push(p);return;}
    const parts=folderPath.split('/').filter(Boolean);
    let node=root;
    parts.forEach(part=>{
      if(!node.children.has(part))node.children.set(part,{children:new Map(),projects:[]});
      node=node.children.get(part);
    });
    node.projects.push(p);
  });
  function renderProjectRow(p,depth=0){
    const d=new Date(p.savedAt),ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const tags=(p.tags||[]).map(t=>`<span class="db-file-tag">${esc(t)}</span>`).join(' ');
    const fc=(p.payload?.files||[]).length;
    return `<div class="db-project" onclick="loadProjectFromDb(${p.id})" style="padding-left:${12+depth*14}px">
      <div style="flex:1;min-width:0">
        <div class="db-project-name" title="${esc(p.name)}">${esc(p.name)}</div>
        <div class="db-project-meta">${ds} · ${fc} file(s)</div>
        ${tags?`<div style="margin-top:3px">${tags}</div>`:''}
      </div>
      <div class="db-project-actions">
        <button class="btn" onclick="event.stopPropagation();moveDbProjectFolder(${p.id})" title="Move folder">📁</button>
        <button class="btn" onclick="event.stopPropagation();renameDbProject(${p.id})" title="Rename">✎</button>
        <button class="btn warn" onclick="event.stopPropagation();deleteDbProject(${p.id})" title="Delete">✕</button>
      </div>
    </div>`;
  }
  function countNodeProjects(node){
    let c=node.projects.length;
    node.children.forEach(ch=>{c+=countNodeProjects(ch);});
    return c;
  }
  function renderFolderNode(name,node,pathParts,depth){
    const nodeKey=pathParts.join('/');
    if(projectFolderOpenState[nodeKey]===undefined)projectFolderOpenState[nodeKey]=true;
    const open=projectFolderOpenState[nodeKey]!==false;
    let h=`<div class="sb-section" style="padding:.3rem .65rem;border-bottom:none;margin-left:${depth*10}px">
      <button class="acc-head" type="button" onclick="toggleProjectFolder('${encodeURIComponent(nodeKey)}')">
        <span class="sb-title" style="margin-bottom:0">${esc(name)} (${countNodeProjects(node)})</span>
        <span class="acc-toggle">${open?'▾':'▸'}</span>
      </button>
    </div>`;
    if(!open)return h;
    node.projects.forEach(p=>{h+=renderProjectRow(p,depth+1);});
    [...node.children.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([childName,childNode])=>{
      h+=renderFolderNode(childName,childNode,[...pathParts,childName],depth+1);
    });
    return h;
  }
  let html='';
  if(root.projects.length){
    if(projectFolderOpenState.__ungrouped===undefined)projectFolderOpenState.__ungrouped=true;
    const open=projectFolderOpenState.__ungrouped!==false;
    html+=`<div class="sb-section" style="padding:.3rem .65rem;border-bottom:none">
      <button class="acc-head" type="button" onclick="toggleProjectFolder('__ungrouped')">
        <span class="sb-title" style="margin-bottom:0">Ungrouped (${root.projects.length})</span>
        <span class="acc-toggle">${open?'▾':'▸'}</span>
      </button>
    </div>`;
    if(open)root.projects.forEach(p=>{html+=renderProjectRow(p,1);});
  }
  [...root.children.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name,node])=>{
    html+=renderFolderNode(name,node,[name],0);
  });
  el.innerHTML=html||'<div class="db-empty">No saved projects</div>';
}
function toggleProjectFolder(folderKey){
  const folder=folderKey==='__ungrouped'?'__ungrouped':decodeURIComponent(folderKey);
  projectFolderOpenState[folder]=!(projectFolderOpenState[folder]!==false);
  renderDbProjectList();
}
function normalizeFolderPath(v){
  return String(v||'').replace(/\\/g,'/').split('/').map(s=>s.trim()).filter(Boolean).join('/');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function chartToPngDataUrl(chart){if(!chart)return null;chart.resize();return chart.toBase64Image('image/png',1);}
function exportChartImage(chart,filenameBase,format='png'){

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function zoomRange(min,max,center,factor,bMin,bMax){
  if(!isFinite(min)||!isFinite(max)||max<=min)return[min,max];
  const c=clamp(center,min,max),span=(max-min)*factor;
  let nMin=c-(c-min)*factor,nMax=nMin+span;
  if(isFinite(bMin)&&nMin<bMin){nMax+=bMin-nMin;nMin=bMin;}
  if(isFinite(bMax)&&nMax>bMax){nMin-=nMax-bMax;nMax=bMax;}
  if(nMax<=nMin)return[min,max];return[nMin,nMax];
}
function getChartPointer(e,ch){
  if(!ch||!ch.chartArea)return null;
  const p=Chart.helpers.getRelativePosition(e,ch);
  if(!p||!isFinite(p.x)||!isFinite(p.y))return null;
  const a=ch.chartArea;if(p.x<a.left||p.x>a.right||p.y<a.top||p.y>a.bottom)return null;
  return p;
}
function bindWheelZoom(canvas,chartRef,view,bounds,modeGetter,onChange){
  if(!canvas||canvas.dataset.zoomBound==='1')return;canvas.dataset.zoomBound='1';
  canvas.addEventListener('wheel',e=>{
    if(modeGetter()!=='zoom')return;const ch=chartRef();if(!ch)return;
    const p=getChartPointer(e,ch);if(!p)return;e.preventDefault();
    const zf=e.deltaY<0?0.85:1.18;
    if(e.altKey){const sc=ch.scales.y;const c=sc.getValueForPixel(p.y);const curMin=view.yMin??sc.min,curMax=view.yMax??sc.max;const next=zoomRange(curMin,curMax,c,zf,bounds.yMin,bounds.yMax);view.yMin=next[0];view.yMax=next[1];}
    else{const sc=ch.scales.x;const c=sc.getValueForPixel(p.x);const curMin=view.xMin??sc.min,curMax=view.xMax??sc.max;const next=zoomRange(curMin,curMax,c,zf,bounds.xMin,bounds.xMax);view.xMin=next[0];view.xMax=next[1];}
    onChange();
  },{passive:false});
}
function bindDragZoom(canvas,chartRef,view,bounds,modeGetter,boxEl,onChange){
  if(!canvas||canvas.dataset.dragZoomBound==='1')return;canvas.dataset.dragZoomBound='1';
  const st={active:false,sx:0,sy:0};
  canvas.addEventListener('mousedown',e=>{if(modeGetter()!=='zoom'||e.button!==0)return;const ch=chartRef();if(!ch)return;const p=getChartPointer(e,ch);if(!p)return;st.active=true;st.sx=p.x;st.sy=p.y;if(boxEl){boxEl.style.display='block';boxEl.style.left=`${st.sx}px`;boxEl.style.top=`${st.sy}px`;boxEl.style.width='0px';boxEl.style.height='0px';}});
  canvas.addEventListener('mousemove',e=>{if(!st.active||!boxEl)return;const ch=chartRef();if(!ch)return;const p=Chart.helpers.getRelativePosition(e,ch);if(!p)return;const x=Math.min(st.sx,p.x),y=Math.min(st.sy,p.y),w=Math.abs(p.x-st.sx),h=Math.abs(p.y-st.sy);boxEl.style.left=`${x}px`;boxEl.style.top=`${y}px`;boxEl.style.width=`${w}px`;boxEl.style.height=`${h}px`;});
  canvas.addEventListener('mouseup',e=>{if(!st.active)return;st.active=false;if(boxEl)boxEl.style.display='none';const ch=chartRef();if(!ch)return;const p=Chart.helpers.getRelativePosition(e,ch);if(!p)return;if(Math.abs(p.x-st.sx)<6||Math.abs(p.y-st.sy)<6)return;const sx=ch.scales.x,sy=ch.scales.y;const x1=sx.getValueForPixel(st.sx),x2=sx.getValueForPixel(p.x);const y1=sy.getValueForPixel(st.sy),y2=sy.getValueForPixel(p.y);view.xMin=clamp(Math.min(x1,x2),bounds.xMin,bounds.xMax);view.xMax=clamp(Math.max(x1,x2),bounds.xMin,bounds.xMax);view.yMin=clamp(Math.min(y1,y2),bounds.yMin,bounds.yMax);view.yMax=clamp(Math.max(y1,y2),bounds.yMin,bounds.yMax);onChange();});
  canvas.addEventListener('mouseleave',()=>{st.active=false;if(boxEl)boxEl.style.display='none';});
}

function loadFile(file){
  const r=new FileReader();
  r.addEventListener('loadend',async()=>{
    if(r.error){toast('ファイル読込失敗: '+(r.error.message||String(r.error)),'err');return;}
    const rawText=r.result;
    try{
      const existing=dbFileCache.find(f=>f.name===file.name);
      let saveName=file.name,saveId=null;
      if(existing){
        const {action,rename}=await showDupModal(existing,rawText);
        if(action==='skip'){parse(rawText,file.name);toast(`スキップ: DBは更新しませんでした`);return;}
        else if(action==='overwrite'){saveId=existing.id;saveName=existing.name;}
        else if(action==='rename'){saveName=rename||`${file.name}_${getDateStamp()}`;saveId=null;}
      }
      parse(rawText,saveName);
      const rowCount=countDataRows(rawText);
      const rec={name:saveName,rawText,rowCount};if(saveId)rec.id=saveId;
      await adapter.saveFile(rec);
      toast(saveId?`上書き: ${saveName}`:`キャッシュ: ${saveName}`);
      await refreshDbPanels();
    }catch(err){console.error(err);toast('DB cache error: '+err.message,'err');}
  });
  try{r.readAsText(file,'UTF-8');}
  catch(e){toast('読込開始失敗: '+e.message,'err');}
}
function countDataRows(txt){
  const lines=txt.split('\n');let start=-1;
  for(let i=0;i<lines.length;i++){if(/^\s*Time\s+Unsubtracted/i.test(lines[i])){start=i+2;break;}}
  if(start<0)return 0;
  let count=0;
  for(let i=start;i<lines.length;i++){const c=lines[i].trim().split(/\t/);if(c.length>=5&&!c.slice(0,5).some(v=>isNaN(parseFloat(v))))count++;}
  return count;
}
function parse(txt,fname){
  const lines=txt.split('\n');const meta={};const methodSteps=[];let dataStart=-1;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/^\s*Time\s+Unsubtracted/i.test(l)){dataStart=i+2;break;}
    const kv=l.split('\t');if(kv.length>=2){const k=kv[0].trim().replace(/:$/,'');const v=kv.slice(1).join('\t').trim();if(k&&v)meta[k]=v;}
    const scanMatch=l.match(/^(\d+)\)\s*(Cool|Heat)\s+from\s+([-\d.]+).C\s+to\s+([-\d.]+).C\s+at\s+([\d.]+).C\/min/i);
    if(scanMatch)methodSteps.push({num:+scanMatch[1],type:scanMatch[2].toLowerCase()==='heat'?'heating':'cooling',fromT:+scanMatch[3],toT:+scanMatch[4],rate:+scanMatch[5],duration:null});
    const holdMatch=l.match(/^(\d+)\)\s*Hold\s+for\s+([\d.]+)\s*min\s+at\s+([-\d.]+).C/i);
    if(holdMatch)methodSteps.push({num:+holdMatch[1],type:'isothermal',fromT:+holdMatch[3],toT:+holdMatch[3],rate:0,duration:+holdMatch[2]});
  }
  if(dataStart<0){alert(`${fname}: Data columns not found`);return;}
  const rows=[];
  for(let i=dataStart;i<lines.length;i++){
    const c=lines[i].trim().split(/\t/);if(c.length<5)continue;
    const n=c.map(v=>parseFloat(v.trim()));if(n.slice(0,5).some(isNaN))continue;
    rows.push({time:n[0],hf_raw:n[1],temp:n[4],hf:isNaN(n[7])?n[1]:n[7]});
  }
  if(!rows.length){alert(`${fname}: No numeric data`);return;}
  const segments=assignSegments(rows,methodSteps).map((s,idx)=>({
    ...s,idx,visible:true,selectedOuter:false,
    dOffset:0,yGain:1,
    outerXOffset:0,outerOffset:0,outerGain:1,
    outerColor:'',outerLabel:''
  }));
  const id=nextFid++;
  files.push({
    id,name:fname,color:FC[(files.length)%FC.length],data:rows,segments,meta,
    chart:null,sidebarOpen:true,mode:'zoom',
    dscX:'time',          // 'temp' | 'time'
    dscY:'heatflow',      // 'heatflow' | 'temp'
    view:{xMin:null,xMax:null,yMin:null,yMax:null},
    bounds:{xMin:0,xMax:1,yMin:0,yMax:1},
    chartScale:100
  });
  renderAll();
}
function assignSegments(rows,methodSteps){
  if(!methodSteps.length)return autoSegments(rows);
  const N=rows.length,segments=[],time0=rows[0].time,time1=rows[N-1].time,measuredTotal=Math.max(1e-6,time1-time0);
  const rawDur=methodSteps.map(st=>st.type==='isothermal'?Math.max(0,st.duration||0):((!isFinite(st.rate)||st.rate<=0)?0:Math.max(0,Math.abs(st.toT-st.fromT)/st.rate)));
  let predTotal=rawDur.reduce((a,b)=>a+b,0);if(!isFinite(predTotal)||predTotal<=0)predTotal=measuredTotal;
  const scale=measuredTotal/predTotal,cumEnds=[];let acc=0;rawDur.map(d=>Math.max(0,d*scale)).forEach(d=>{acc+=d;cumEnds.push(acc);});
  let cursor=0;
  methodSteps.forEach((step,si)=>{
    if(cursor>=N-1)return;
    let endIdx=si===methodSteps.length-1?N-1:Math.max(cursor+5,Math.min(nearestTimeIndex(rows,time0+cumEnds[si]),N-2));
    if(endIdx<=cursor)endIdx=Math.min(cursor+10,N-1);
    const sl=rows.slice(cursor,endIdx+1);
    segments.push({...step,start:cursor,end:endIdx,tmin:Math.min(...sl.map(r=>r.temp)),tmax:Math.max(...sl.map(r=>r.temp)),tStart:rows[cursor].time,tEnd:rows[endIdx].time});
    cursor=endIdx+1;
  });
  if(!segments.length)return autoSegments(rows);
  const last=segments[segments.length-1];
  if(last.end<N-1){last.end=N-1;const sl=rows.slice(last.start,last.end+1);last.tmin=Math.min(...sl.map(r=>r.temp));last.tmax=Math.max(...sl.map(r=>r.temp));last.tEnd=rows[last.end].time;}
  return segments;
}
function autoSegments(rows){
  const segs=[];let dir=0,ss=0,idx=0;const sm=10;
  const ld=i=>rows[Math.min(rows.length-1,i+sm)].temp-rows[Math.max(0,i-sm)].temp;
  for(let i=sm;i<rows.length-sm;i+=5){
    const d=ld(i),nd=Math.abs(d)<0.5?0:(d>0?1:-1);
    if(nd!==dir&&i-ss>100){
      if(i-ss>200){const sl=rows.slice(ss,i),tp=dir===1?'heating':dir===-1?'cooling':'isothermal';segs.push({num:idx+1,type:tp,start:ss,end:i-1,rate:15,tmin:Math.min(...sl.map(r=>r.temp)),tmax:Math.max(...sl.map(r=>r.temp)),tStart:rows[ss].time,tEnd:rows[i-1].time});idx++;}
      ss=i;dir=nd;
    }
  }
  if(rows.length-ss>200){const sl=rows.slice(ss),tp=dir===1?'heating':dir===-1?'cooling':'isothermal';segs.push({num:idx+1,type:tp,start:ss,end:rows.length-1,rate:15,tmin:Math.min(...sl.map(r=>r.temp)),tmax:Math.max(...sl.map(r=>r.temp)),tStart:rows[ss].time,tEnd:rows[rows.length-1].time});}
  return segs;
}
function nearestTimeIndex(rows,t){
  if(!rows.length)return -1;if(t<=rows[0].time)return 0;if(t>=rows[rows.length-1].time)return rows.length-1;
  let lo=0,hi=rows.length-1;while(lo<hi-1){const m=(lo+hi)>>1;if(rows[m].time<=t)lo=m;else hi=m;}
  return Math.abs(rows[lo].time-t)<=Math.abs(rows[hi].time-t)?lo:hi;
}

// Per-file segment points respecting f.dscX (X axis) and f.dscY (Y axis).
// dOffset/yGain are applied to the Y series; for Y='temp' yGain is forced to 1
// (gain on a temperature trace would distort the absolute scale).
function getSegPts(f,s,step=3){
  const xMode=f.dscX,yMode=f.dscY;
  return f.data.slice(s.start,s.end+1).filter((_,j)=>j%step===0).map(r=>{
    const x=xMode==='temp'?+r.temp.toFixed(3):+r.time.toFixed(4);
    let y;
    if(yMode==='temp'){
      y=+(r.temp+(s.dOffset||0)).toFixed(3);
    }else{
      y=+(r.hf*(s.yGain||1)+(s.dOffset||0)).toFixed(5);
    }
    return {x,y};
  });
}
function defaultOuterLabel(f,s){return `${f.name.replace(/\.[^.]+$/,'')} / Step${s.num}`;}
function defaultOuterColor(f,s){return STYPE_COLOR[s.type]||f.color;}
function getOuterSegPts(f,s){
  const ignoreOffsets=(outerYAxis==='temp'&&outerShowAllTempSegments);
  const xShift=ignoreOffsets?0:(isFinite(s.outerXOffset)?s.outerXOffset:0);
  const yShift=ignoreOffsets?0:(isFinite(s.outerOffset)?s.outerOffset:0);
  const yGain=(isFinite(s.outerGain)&&s.outerGain>0)?s.outerGain:1;
  return f.data.slice(s.start,s.end+1).filter((_,j)=>j%3===0).map(r=>{
    const rawX=outerXAxis==='temp'?r.temp:r.time;
    const x=+(rawX+xShift).toFixed(outerXAxis==='temp'?3:4);
    if(outerYAxis==='temp'){const y=+(r.temp+yShift).toFixed(3);return {x,y};}
    const y=+(r.hf*yGain+yShift).toFixed(5);
    return {x,y};
  });
}

function fmt(v,d){return isFinite(v)?(+v).toFixed(d):'';}

function renderFileChart(f){
  const cvs=document.getElementById(`cvs-${f.id}`);
  if(!cvs)return;
  if(f.chart)f.chart.destroy();
  const vis=f.segments.filter(s=>s.visible);
  const datasets=[];
  const bounds={xMin:Infinity,xMax:-Infinity,yMin:Infinity,yMax:-Infinity};
  vis.forEach(s=>{
    const pts=getSegPts(f,s,3);
    pts.forEach(p=>{bounds.xMin=Math.min(bounds.xMin,p.x);bounds.xMax=Math.max(bounds.xMax,p.x);bounds.yMin=Math.min(bounds.yMin,p.y);bounds.yMax=Math.max(bounds.yMax,p.y);});
    datasets.push({label:`Step${s.num} (${s.type})`,data:pts,borderColor:STYPE_COLOR[s.type]||f.color,borderWidth:1.7,pointRadius:0,tension:0.1,fill:false});
  });
  if(!isFinite(bounds.xMin))Object.assign(bounds,{xMin:0,xMax:1,yMin:0,yMax:1});
  f.bounds=bounds;
  const xUnit=axisUnitX(f.dscX),yUnit=axisUnitY(f.dscY);
  const opts={
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'nearest',intersect:false},
    plugins:{
      legend:{display:true,position:'top',labels:{color:chartTickColor(),font:{size:10,family:'IBM Plex Mono'}}},
      tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: x=${(+ctx.parsed.x).toFixed(3)} ${xUnit}, y=${(+ctx.parsed.y).toFixed(4)} ${yUnit}`}}
    },
    scales:{
      x:{type:'linear',min:f.view.xMin??undefined,max:f.view.xMax??undefined,grid:{color:chartGridColor()},ticks:{color:chartTickColor()},title:{display:true,text:axisLabelX(f.dscX),color:chartTickColor()}},
      y:{min:f.view.yMin??undefined,max:f.view.yMax??undefined,grid:{color:chartGridColor()},ticks:{color:chartTickColor()},title:{display:true,text:axisLabelY(f.dscY),color:chartTickColor()}}
    }
  };
  f.chart=new Chart(cvs,{type:'line',data:{datasets},options:opts});
  bindWheelZoom(cvs,()=>f.chart,f.view,f.bounds,()=>f.mode,()=>renderFileOuters());
  bindDragZoom(cvs,()=>f.chart,f.view,f.bounds,()=>f.mode,document.getElementById(`zoomBox-${f.id}`),()=>renderFileOuters());
}

function findFile(fid){return files.find(f=>f.id===fid)||null;}
function removeFile(fid){const f=findFile(fid);if(!f)return;if(f.chart)f.chart.destroy();files=files.filter(x=>x.id!==fid);delete fileAcc[fid];renderAll();}
function toggleFileChartBody(fid){const f=findFile(fid);if(!f)return;f.chartOpen=f.chartOpen===false?true:false;renderFileOuters();}
function toggleFileAcc(fid,key){if(!fileAcc[fid])fileAcc[fid]={controls:true,span:true,segments:true};fileAcc[fid][key]=!fileAcc[fid][key];renderFileOuters();}
function toggleFileSidebar(fid){const f=findFile(fid);if(!f)return;f.sidebarOpen=!f.sidebarOpen;renderFileOuters();}
function setFileMode(fid,mode){const f=findFile(fid);if(!f)return;f.mode=mode==='lock'?'lock':'zoom';renderFileOuters();}
function setFileX(fid,mode){const f=findFile(fid);if(!f)return;const next=mode==='time'?'time':'temp';if(f.dscX===next)return;f.dscX=next;f.view={xMin:null,xMax:null,yMin:null,yMax:null};renderFileOuters();}
function setFileY(fid,mode){const f=findFile(fid);if(!f)return;const next=mode==='temp'?'temp':'heatflow';if(f.dscY===next)return;f.dscY=next;f.view={xMin:null,xMax:null,yMin:null,yMax:null};renderFileOuters();}
function setFileScale(fid,v){const f=findFile(fid);if(!f)return;const n=parseInt(v,10);f.chartScale=clamp(isNaN(n)?100:n,60,200);renderFileOuters();}
function toggleSegVisible(fid,idx,checked){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;s.visible=!!checked;renderFileOuters();}
function toggleSegOuter(fid,idx,checked){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;s.selectedOuter=!!checked;renderAll();}
function setSegOffset(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;const n=parseFloat(v);s.dOffset=isNaN(n)?0:n;renderFileOuters();}
function setSegGain(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;const n=parseFloat(v);s.yGain=(isNaN(n)||n<=0)?1:n;renderFileOuters();}
function resetFileView(fid){const f=findFile(fid);if(!f)return;f.view={xMin:null,xMax:null,yMin:null,yMax:null};renderFileOuters();}
function zoomFile(fid,axis,factor){
  const f=findFile(fid);if(!f||!f.chart)return;
  const sx=f.chart.scales.x,sy=f.chart.scales.y;
  if(axis==='x'){const c=(sx.min+sx.max)/2;const curMin=f.view.xMin??sx.min,curMax=f.view.xMax??sx.max;const next=zoomRange(curMin,curMax,c,factor,f.bounds.xMin,f.bounds.xMax);f.view.xMin=next[0];f.view.xMax=next[1];}
  else{const c=(sy.min+sy.max)/2;const curMin=f.view.yMin??sy.min,curMax=f.view.yMax??sy.max;const next=zoomRange(curMin,curMax,c,factor,f.bounds.yMin,f.bounds.yMax);f.view.yMin=next[0];f.view.yMax=next[1];}
  renderFileOuters();
}
function applyFileSpan(fid){
  const f=findFile(fid);if(!f)return;
  const xMin=parseFloat(document.getElementById(`fxMin-${fid}`).value),
        xMax=parseFloat(document.getElementById(`fxMax-${fid}`).value),
        yMin=parseFloat(document.getElementById(`fyMin-${fid}`).value),
        yMax=parseFloat(document.getElementById(`fyMax-${fid}`).value);
  f.view={xMin:isNaN(xMin)?null:xMin,xMax:isNaN(xMax)?null:xMax,yMin:isNaN(yMin)?null:yMin,yMax:isNaN(yMax)?null:yMax};
  renderFileOuters();
}

function selectedOuterSegs(){const arr=[];files.forEach(f=>f.segments.filter(s=>s.selectedOuter).forEach(s=>arr.push({f,s,key:`${f.id}_${s.idx}`})));return arr;}
function outerSegsForChart(){
  if(outerYAxis==='temp'&&outerShowAllTempSegments){
    const arr=[];
    files.forEach(f=>f.segments.forEach(s=>arr.push({f,s,key:`${f.id}_${s.idx}`})));
    return arr;
  }
  return selectedOuterSegs();
}
function renderOuterChart(){
  const wrap=document.getElementById('outerWrap');const sel=outerSegsForChart();
  if(!sel.length){if(outerChart){outerChart.destroy();outerChart=null;}wrap.innerHTML='<div class="outer-placeholder">Enable "Outer" on any segment to show it here.</div>';return;}
  wrap.innerHTML=`
    <div class="chart-outer">
      <div class="chart-head">
        <div class="chart-title">Outer Chart (${sel.length} segments)</div>
        <button class="btn" onclick="exportOuterChart('png')">PNG</button>
        <button class="btn" onclick="exportOuterChart('pdf')">PDF</button>
        <button class="btn" onclick="toggleOuterChartBody()">${outerChartOpen?'Collapse':'Expand'}</button>
        <button class="btn" onclick="toggleOuterSidebar()">${outerSidebarOpen?'Hide':'Show'} Sidebar</button>
      </div>
      <div class="chart-body ${outerSidebarOpen?'':'sidebar-hidden'}" style="${outerChartOpen?'':'display:none'}">
        <div class="sidebar-wrap">${renderOuterSidebarHtml(sel)}</div>
        <div class="chart-pane" style="height:${outerHeight}px">
          <div class="pane-title">${axisLabelY(outerYAxis)} vs ${axisLabelX(outerXAxis)}</div>
          <div class="canvas-wrap"><div class="zoom-box" id="outerZoomBox"></div><canvas id="outerChartCvs"></canvas></div>
        </div>
      </div>
    </div>`;
  if(!outerChartOpen){
    if(outerChart){outerChart.destroy();outerChart=null;}
    return;
  }
  const datasets=[];const bounds={xMin:Infinity,xMax:-Infinity,yMin:Infinity,yMax:-Infinity};
  sel.forEach(({f,s})=>{
    const pts=getOuterSegPts(f,s);
    pts.forEach(p=>{bounds.xMin=Math.min(bounds.xMin,p.x);bounds.xMax=Math.max(bounds.xMax,p.x);bounds.yMin=Math.min(bounds.yMin,p.y);bounds.yMax=Math.max(bounds.yMax,p.y);});
    const unifiedTempColor=(outerYAxis==='temp'&&outerShowAllTempSegments)?f.color:null;
    const lineColor=unifiedTempColor||(s.outerColor||defaultOuterColor(f,s));
    datasets.push({label:(s.outerLabel||defaultOuterLabel(f,s)),data:pts,borderColor:lineColor,borderWidth:1.8,pointRadius:0,tension:0.1,fill:false});
  });
  if(!isFinite(bounds.xMin))Object.assign(bounds,{xMin:0,xMax:1,yMin:0,yMax:1});
  outerBounds=bounds;if(outerChart)outerChart.destroy();
  const xUnit=axisUnitX(outerXAxis),yUnit=axisUnitY(outerYAxis);
  outerChart=new Chart(document.getElementById('outerChartCvs'),{
    type:'line',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{color:chartTickColor(),font:{size:10,family:'IBM Plex Mono'}}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: x=${(+ctx.parsed.x).toFixed(3)} ${xUnit}, y=${(+ctx.parsed.y).toFixed(4)} ${yUnit}`}}
      },
      scales:{
        x:{type:'linear',min:outerView.xMin??undefined,max:outerView.xMax??undefined,grid:{color:chartGridColor()},ticks:{color:chartTickColor()},title:{display:true,text:axisLabelX(outerXAxis),color:chartTickColor()}},
        y:{min:outerView.yMin??undefined,max:outerView.yMax??undefined,grid:{color:chartGridColor()},ticks:{color:chartTickColor()},title:{display:true,text:axisLabelY(outerYAxis),color:chartTickColor()}}
      }
    }
  });
  bindWheelZoom(document.getElementById('outerChartCvs'),()=>outerChart,outerView,outerBounds,()=>'zoom',()=>renderOuterChart());
  bindDragZoom(document.getElementById('outerChartCvs'),()=>outerChart,outerView,outerBounds,()=>'zoom',document.getElementById('outerZoomBox'),()=>renderOuterChart());
}
function renderOuterSidebarHtml(sel){
  const yIsTemp=outerYAxis==='temp';
  const tempAllOn=yIsTemp&&outerShowAllTempSegments;
  const segTitle=tempAllOn?'Displayed Segments (All)':`Selected Segments`;
  const segHint=tempAllOn
    ? '<em>Temp全表示モード: 全セグメントを表示し、同一ファイル内は同色で描画します</em>'
    : (yIsTemp?'<em>Outer Y-Gain は Temp モードでは無視されます</em>':'Outer Y-Gain は Heat Flow にのみ適用されます');
  return `
    <div class="sidebar-card">
      <button type="button" class="acc-head" onclick="toggleOuterAcc('axes')">
        <span class="lbl">X axis / Y axis / Zoom / Size</span><span class="acc-toggle">${outerAcc.axes?'▾':'▸'}</span>
      </button>
      <div class="acc-body ${outerAcc.axes?'':'closed'}">
      <div class="lbl">X axis / Y axis / Zoom / Size</div>
      <div class="btn-row">
        <button class="btn ${outerXAxis==='temp'?'on':''}" onclick="setOuterX('temp')">X: Temp</button>
        <button class="btn ${outerXAxis==='time'?'on':''}" onclick="setOuterX('time')">X: Time</button>
      </div>
      <div class="btn-row">
        <button class="btn ${outerYAxis==='heatflow'?'on':''}" onclick="setOuterY('heatflow')">Y: Heat Flow</button>
        <button class="btn ${outerYAxis==='temp'?'on':''}" onclick="setOuterY('temp')">Y: Sample Temp</button>
      </div>
      <div class="btn-row">
        <button class="btn ${(tempAllOn)?'on':''}" onclick="toggleOuterAllTempSegments()" ${yIsTemp?'':'disabled'}>Temp: Show All Segments</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="zoomOuter('x',0.85)">X+</button><button class="btn" onclick="zoomOuter('x',1.18)">X-</button>
        <button class="btn" onclick="zoomOuter('y',0.85)">Y+</button><button class="btn" onclick="zoomOuter('y',1.18)">Y-</button>
        <button class="btn" onclick="resetOuterView()">Reset</button>
      </div>
      <div class="mini">Height</div><input class="num" type="number" min="260" max="1000" value="${outerHeight}" onchange="setOuterHeight(this.value)">
      <div class="lbl">Display Span</div>
      <div class="mini" style="margin-bottom:2px">X: ${axisUnitX(outerXAxis)} &nbsp;|&nbsp; Y: ${axisUnitY(outerYAxis)}</div>
      <div class="seg-grid">
        <input class="num" id="oxMin" placeholder="x min" value="${fmt(outerView.xMin,3)}">
        <input class="num" id="oxMax" placeholder="x max" value="${fmt(outerView.xMax,3)}">
        <input class="num" id="oyMin" placeholder="y min" value="${fmt(outerView.yMin,4)}">
        <input class="num" id="oyMax" placeholder="y max" value="${fmt(outerView.yMax,4)}">
      </div>
      <div class="btn-row"><button class="btn" onclick="applyOuterSpan()">Apply</button></div>
      </div>
    </div>
    <div class="sidebar-card">
      <button type="button" class="acc-head" onclick="toggleOuterAcc('segments')">
        <span class="lbl">${segTitle}</span><span class="acc-toggle">${outerAcc.segments?'▾':'▸'}</span>
      </button>
      <div class="acc-body ${outerAcc.segments?'':'closed'}">
      <div class="lbl">${segTitle}</div>
      <div class="mini" style="margin-bottom:3px">${segHint}</div>
      <div class="seg-list" style="max-height:290px">
      ${sel.map(({f,s})=>`
        <div class="seg-item">
          <div class="seg-text">
            <div><strong>${esc(f.name.replace(/\.[^.]+$/,''))}</strong> / Step ${s.num}</div>
            <div class="mini">${s.type}</div>
            <div class="mini">Label</div>
            <input class="num" type="text" value="${(s.outerLabel||'').replace(/"/g,'&quot;')}" placeholder="${esc(defaultOuterLabel(f,s))}" onchange="setOuterSegLabel(${f.id},${s.idx},this.value)">
            <div class="mini" style="margin-top:4px">Color</div>
            <input class="num" type="color" value="${tempAllOn?f.color:(s.outerColor||defaultOuterColor(f,s))}" onchange="setOuterSegColor(${f.id},${s.idx},this.value)" ${tempAllOn?'disabled':''}>
            <div class="mini" style="margin-top:4px">Offset (X / Y)</div>
            <div class="seg-grid">
              <input class="num" type="number" step="0.05" value="${s.outerXOffset||0}" onchange="setOuterSegXOffset(${f.id},${s.idx},this.value)">
              <input class="num" type="number" step="0.05" value="${s.outerOffset}" onchange="setOuterSegOffset(${f.id},${s.idx},this.value)">
            </div>
            <div class="mini" style="margin-top:4px">Gain (Y, HeatFlow only)</div>
            <div class="seg-grid">
              <input class="num" type="number" step="0.05" min="0.05" value="${s.outerGain}" onchange="setOuterSegGain(${f.id},${s.idx},this.value)" ${yIsTemp?'disabled':''}>
            </div>
          </div>
        </div>
      `).join('')}
      </div>
      </div>
    </div>`;
}
function toggleOuterAcc(key){outerAcc[key]=!outerAcc[key];renderOuterChart();}
function toggleOuterSidebar(){outerSidebarOpen=!outerSidebarOpen;renderOuterChart();}
function toggleOuterChartBody(){outerChartOpen=!outerChartOpen;renderOuterChart();}
function setOuterX(mode){const next=mode==='temp'?'temp':'time';if(outerXAxis===next)return;outerXAxis=next;outerView={xMin:null,xMax:null,yMin:null,yMax:null};renderOuterChart();}
function setOuterY(mode){const next=mode==='temp'?'temp':'heatflow';if(outerYAxis===next)return;outerYAxis=next;outerView={xMin:null,xMax:null,yMin:null,yMax:null};renderOuterChart();}
function toggleOuterAllTempSegments(){if(outerYAxis!=='temp')return;outerShowAllTempSegments=!outerShowAllTempSegments;renderOuterChart();}
function setOuterHeight(v){const n=parseInt(v,10);outerHeight=clamp(isNaN(n)?400:n,260,1000);renderOuterChart();}
function resetOuterView(){outerView={xMin:null,xMax:null,yMin:null,yMax:null};renderOuterChart();}
function applyOuterSpan(){
  const xMin=parseFloat(document.getElementById('oxMin').value),xMax=parseFloat(document.getElementById('oxMax').value),yMin=parseFloat(document.getElementById('oyMin').value),yMax=parseFloat(document.getElementById('oyMax').value);
  outerView={xMin:isNaN(xMin)?null:xMin,xMax:isNaN(xMax)?null:xMax,yMin:isNaN(yMin)?null:yMin,yMax:isNaN(yMax)?null:yMax};renderOuterChart();
}
function zoomOuter(axis,factor){
  if(!outerChart)return;const sx=outerChart.scales.x,sy=outerChart.scales.y;
  if(axis==='x'){const c=(sx.min+sx.max)/2,curMin=outerView.xMin??sx.min,curMax=outerView.xMax??sx.max,next=zoomRange(curMin,curMax,c,factor,outerBounds.xMin,outerBounds.xMax);outerView.xMin=next[0];outerView.xMax=next[1];}
  else{const c=(sy.min+sy.max)/2,curMin=outerView.yMin??sy.min,curMax=outerView.yMax??sy.max,next=zoomRange(curMin,curMax,c,factor,outerBounds.yMin,outerBounds.yMax);outerView.yMin=next[0];outerView.yMax=next[1];}
  renderOuterChart();
}
function setOuterSegXOffset(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;const n=parseFloat(v);s.outerXOffset=isNaN(n)?0:n;renderOuterChart();}
function setOuterSegOffset(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;const n=parseFloat(v);s.outerOffset=isNaN(n)?0:n;renderOuterChart();}
function setOuterSegGain(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;const n=parseFloat(v);s.outerGain=(isNaN(n)||n<=0)?1:n;renderOuterChart();}
function setOuterSegLabel(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;s.outerLabel=(v||'').trim();renderOuterChart();}
function setOuterSegColor(fid,idx,v){const f=findFile(fid);if(!f)return;const s=f.segments.find(x=>x.idx===idx);if(!s)return;s.outerColor=typeof v==='string'?v:'';renderOuterChart();}
function exportFileChart(fid,format){const f=findFile(fid);if(!f)return;const tag=`${f.dscY}_vs_${f.dscX}`;exportChartImage(f.chart,`${f.name.replace(/\.[^.]+$/,'')}_${tag}_${getDateStamp()}`,format);}
function exportOuterChart(format){if(!outerChart){alert('Outer chart not ready');return;}exportChartImage(outerChart,`outer_${outerYAxis}_vs_${outerXAxis}_${getDateStamp()}`,format);}

// ════════════════════════════════════════════════
//  SERIALIZE / HYDRATE  (project JSON)
// ════════════════════════════════════════════════
function serializeProject(){
  return{
    version:3,
    kind:'heatflow_tempdep_timedep',
    savedAt:new Date().toISOString(),
    nextFid,
    outer:{outerSidebarOpen,outerChartOpen,outerXAxis,outerYAxis,outerShowAllTempSegments,outerHeight,outerView},
    files:files.map(f=>({
      id:f.id,name:f.name,color:f.color,meta:f.meta,data:f.data,
      chartScale:f.chartScale,sidebarOpen:f.sidebarOpen,chartOpen:f.chartOpen!==false,mode:f.mode,
      dscX:f.dscX,dscY:f.dscY,view:f.view,
      segments:f.segments.map(s=>({...s}))
    }))
  };
}
function serializeDataOnly(){return{version:3,kind:'heatflow_tempdep_timedep',savedAt:new Date().toISOString(),files:files.map(f=>({name:f.name,meta:f.meta,data:f.data}))};}
function hydrateProject(payload,{replace=true,dataOnly=false}={}){
  if(!payload||!Array.isArray(payload.files)){alert('Invalid JSON format');return;}
  if(replace){files.forEach(f=>{if(f.chart)f.chart.destroy();});files=[];}
  if(!dataOnly){
    outerSidebarOpen=payload.outer?.outerSidebarOpen??outerSidebarOpen;
    outerChartOpen=payload.outer?.outerChartOpen!==false;
    outerXAxis=payload.outer?.outerXAxis==='temp'?'temp':'time';
    outerYAxis=payload.outer?.outerYAxis==='temp'?'temp':'heatflow';
    outerShowAllTempSegments=!!payload.outer?.outerShowAllTempSegments;
    outerHeight=clamp(parseInt(payload.outer?.outerHeight,10)||outerHeight,260,1000);
    outerView=payload.outer?.outerView||{xMin:null,xMax:null,yMin:null,yMax:null};
  }
  payload.files.forEach((src,idx)=>{
    const id=nextFid++;const rows=Array.isArray(src.data)?src.data:[];if(!rows.length)return;
    const segSource=Array.isArray(src.segments)&&src.segments.length?src.segments:assignSegments(rows,[]);
    const segments=segSource.map((s,i)=>({
      ...s,idx:i,num:s.num??(i+1),
      visible:s.visible!==false,
      selectedOuter:!!s.selectedOuter,
      dOffset:isFinite(s.dOffset)?s.dOffset:0,
      yGain:(isFinite(s.yGain)&&s.yGain>0)?s.yGain:1,
      outerXOffset:isFinite(s.outerXOffset)?s.outerXOffset:0,
      outerOffset:isFinite(s.outerOffset)?s.outerOffset:0,
      outerGain:(isFinite(s.outerGain)&&s.outerGain>0)?s.outerGain:1,
      outerColor:typeof s.outerColor==='string'?s.outerColor:'',
      outerLabel:typeof s.outerLabel==='string'?s.outerLabel:''
    }));
    files.push({
      id,name:src.name||`loaded_${idx+1}.txt`,
      color:src.color||FC[(files.length)%FC.length],
      meta:src.meta||{},data:rows,segments,chart:null,
      sidebarOpen:src.sidebarOpen!==false,
      chartOpen:src.chartOpen!==false,
      mode:src.mode==='lock'?'lock':'zoom',
      dscX:src.dscX==='temp'?'temp':'time',
      dscY:src.dscY==='temp'?'temp':'heatflow',
      view:src.view||{xMin:null,xMax:null,yMin:null,yMax:null},
      bounds:{xMin:0,xMax:1,yMin:0,yMax:1},
      chartScale:clamp(parseInt(src.chartScale,10)||100,60,200)
    });
  });
  renderAll();
}
function exportProjectJson(){downloadText(`dsc_hf_xy_${getDateStamp()}.json`,JSON.stringify(serializeProject()));}
function importProjectJson(file){
  const r=new FileReader();
  r.addEventListener('loadend',()=>{
    if(r.error){toast('JSON 読込失敗: '+(r.error.message||''),'err');return;}
    try{hydrateProject(JSON.parse(r.result),{replace:true,dataOnly:false});toast('Project imported');}
    catch(_e){alert('Invalid project JSON');}
  });
  try{r.readAsText(file,'UTF-8');}catch(e){toast('読込失敗: '+e.message,'err');}
}
function exportDataJson(){downloadText(`dsc_hf_xy_data_${getDateStamp()}.json`,JSON.stringify(serializeDataOnly()));}
function importDataJson(file){
  const r=new FileReader();
  r.addEventListener('loadend',()=>{
    if(r.error){toast('JSON 読込失敗: '+(r.error.message||''),'err');return;}
    try{hydrateProject(JSON.parse(r.result),{replace:false,dataOnly:true});toast('Data imported');}
    catch(_e){alert('Invalid data JSON');}
  });
  try{r.readAsText(file,'UTF-8');}catch(e){toast('読込失敗: '+e.message,'err');}
}

let isLight=localStorage.getItem('dsc_theme')!=='dark';
function applyTheme(){
  document.documentElement.classList.toggle('light',isLight);
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  if(files.length)renderFileOuters();
  if(outerChart)renderOuterChart();
}
function toggleTheme(){isLight=!isLight;localStorage.setItem('dsc_theme',isLight?'light':'dark');applyTheme();}
function chartGridColor(){return isLight?'#e8e8e4':'#222';}
function chartTickColor(){return isLight?'#aaa':'#666';}

// ════════════════════════════════════════════════
//  FULL DB EXPORT / IMPORT
// ════════════════════════════════════════════════
async function exportFullDb(){
  try{
    const [allFiles,allProjects]=await Promise.all([adapter.listFiles(),adapter.listProjects()]);
    const payload={version:1,exportedAt:new Date().toISOString(),adapterName:adapter.name,files:allFiles,projects:allProjects};
    const json=JSON.stringify(payload,null,2);
    const blob=new Blob([json],{type:'application/json;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`dsc_db_full_${getDateStamp()}.json`;a.click();
    URL.revokeObjectURL(url);
    toast(`DB exported — ${allFiles.length} files, ${allProjects.length} projects`);
  }catch(e){toast('Export error: '+e.message,'err');}
}
async function importFullDb(file){
  const r=new FileReader();
  r.addEventListener('loadend',async()=>{
    if(r.error){toast('DB dump 読込失敗: '+(r.error.message||''),'err');return;}
    try{
      const payload=JSON.parse(r.result);
      if(!Array.isArray(payload.files)||!Array.isArray(payload.projects))throw new Error('Invalid DB dump format');
      const fc=payload.files.length,pc=payload.projects.length;
      const exportedAt=payload.exportedAt?new Date(payload.exportedAt).toLocaleString():'不明';
      const msg=`DB dump を読み込みます\n\nExport日時: ${exportedAt}\nFiles: ${fc} 件 / Projects: ${pc} 件\n\nOK = 上書き（既存データを全削除）\nキャンセル = マージ確認へ`;
      const choice=window.confirm(msg);
      let mode;
      if(choice){mode='replace';}
      else{const merge=window.confirm('マージモードで読み込みますか？\n同名ファイル・プロジェクトはスキップされます\n\nOK = マージ / キャンセル = 中止');if(!merge)return;mode='merge';}
      if(mode==='replace'){await adapter.clearFiles();await adapter.clearProjects();}
      let fImported=0,fSkipped=0;
      const existingFiles=mode==='merge'?await adapter.listFiles():[];
      for(const f of payload.files){
        if(mode==='merge'&&existingFiles.find(x=>x.name===f.name)){fSkipped++;continue;}
        const {id:_,...rest}=f;await adapter.saveFile(rest);fImported++;
      }
      let pImported=0,pSkipped=0;
      const existingProjects=mode==='merge'?await adapter.listProjects():[];
      for(const p of payload.projects){
        if(mode==='merge'&&existingProjects.find(x=>x.name===p.name&&x.savedAt===p.savedAt)){pSkipped++;continue;}
        const {id:_,...rest}=p;await adapter.saveProject(rest);pImported++;
      }
      await refreshDbPanels();
      const skipMsg=(fSkipped+pSkipped)>0?` (${fSkipped+pSkipped} skipped)`:'';
      toast(`Imported: ${fImported} files, ${pImported} projects${skipMsg}`);
    }catch(err){toast('Import error: '+err.message,'err');}
  });
  try{r.readAsText(file,'UTF-8');}catch(e){toast('読込失敗: '+e.message,'err');}
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
(async()=>{
  runEnvironmentChecks();
  document.getElementById('adapterBadge').className='adapter-badge idb';
  document.getElementById('dbImportIn').addEventListener('change',e=>{
    const file=e.target.files?.[0];if(file)importFullDb(file);e.target.value='';
  });
  applyTheme();
  if(typeof indexedDB==='undefined')toast('IndexedDB 非対応: DB キャッシュは使えません','err');
  try{await refreshDbPanels();}catch(e){console.error(e);toast('DB init: '+(e.message||e),'err');}
  try{renderOuterChart();}catch(e){console.error(e);toast('Chart init: '+(e.message||e),'err');}
})();
</script>
